{% if notification_popup_items %}
<div id="notification-popup-overlay" style="
    position: fixed; inset: 0; background: rgba(15,23,42,.32); z-index: 9998;
"></div>

<div id="notification-popup" style="
    position: fixed; right: 24px; bottom: 24px; width: min(430px, calc(100vw - 32px));
    background: #ffffff; border-radius: 22px; box-shadow: 0 24px 54px rgba(15,23,42,.18);
    border: 1px solid #dbe3ee; z-index: 9999; overflow: hidden;
">
    <div style="padding: 18px 20px; border-bottom: 1px solid #e2e8f0; display:flex; justify-content:space-between; align-items:center;">
        <strong>Актуальные уведомления</strong>
        <button onclick="closeNotificationPopup()" style="border:none; background:transparent; cursor:pointer; font-size:20px;">×</button>
    </div>

    <div style="max-height: 60vh; overflow:auto;">
        {% for item in notification_popup_items %}
            <div style="padding: 18px 20px; border-bottom: 1px solid #f1f5f9;">
                <div style="font-weight: 700;">{{ item.title }}</div>
                <div style="margin-top: 8px; color:#64748b; line-height:1.5;">{{ item.message }}</div>
                <div style="margin-top: 10px; color:#4338ca;">
                    {{ item.lesson_date }} · {{ item.lesson_number }} пара · {{ item.room_name }}
                </div>

                <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:14px;">
                    <a href="{% url 'university:notification_manual_form' item.pk %}" style="border:none; border-radius:12px; background:#4f46e5; color:#fff; padding:10px 14px; font-weight:700; cursor:pointer; text-decoration:none;">
                        Настроить вручную
                    </a>

                    <form method="post" action="{% url 'university:notification_algorithm' item.pk %}">
                        {% csrf_token %}
                        <input type="hidden" name="next" value="{{ request.path }}">
                        <button type="submit" style="border:none; border-radius:12px; background:#eef2ff; color:#3730a3; padding:10px 14px; font-weight:700; cursor:pointer;">
                            Оставить алгоритму
                        </button>
                    </form>
                </div>
            </div>
        {% endfor %}
    </div>

    <div style="padding: 14px 20px;">
        <a href="{% url 'university:notifications' %}" style="color:#4338ca; text-decoration:none; font-weight:700;">Открыть все уведомления</a>
    </div>
</div>

<script>
function closeNotificationPopup() {
    const popup = document.getElementById('notification-popup');
    const overlay = document.getElementById('notification-popup-overlay');
    if (popup) popup.remove();
    if (overlay) overlay.remove();
}
</script>
{% endif %}
