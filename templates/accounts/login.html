<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вход — Умные Пряники</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #090909;
            --surface: #000000;
            --border: rgba(255,255,255,0.07);
            --border-bright: rgba(255,255,255,0.14);
            --text: #f0f0f0;
            --muted: #666;
            --accent: #e8001d;
            --accent-dim: rgba(232,0,29,0.12);
            --accent-glow: rgba(232,0,29,0.35);
            --radius-sm: 12px;
            --transition: 0.22s ease;
        }

        * { box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Звезды и амбиент */
        #starfield { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
        body::before { content: ""; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E"); opacity: 0.022; pointer-events: none; z-index: 9999; }
        body::after { content: ""; position: fixed; top: -200px; left: -200px; width: 700px; height: 700px; background: radial-gradient(circle, rgba(232,0,29,0.08) 0%, transparent 70%); pointer-events: none; z-index: 0; }

        .star { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; opacity: 0; animation: flyStar linear infinite; filter: drop-shadow(0 0 4px rgba(255,255,255,0.8)); }
        @keyframes flyStar {
            0% { transform: translateY(100vh) translateX(calc(var(--drift) * 1px)) scale(0); opacity: 0; }
            10% { opacity: 1; transform: translateY(90vh) translateX(calc(var(--drift) * 0.9px)) scale(1); }
            90% { opacity: 1; }
            100% { transform: translateY(-20vh) translateX(calc(var(--drift) * 0.1px)) scale(0.3); opacity: 0; }
        }

        .login-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px 32px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        .brand-logo { width: 64px; height: 64px; object-fit: contain; margin-bottom: 16px; }
        h1 { margin: 0 0 24px; font-size: 24px; font-weight: 800; letter-spacing: 1px; }

        form { display: flex; flex-direction: column; gap: 16px; text-align: left; }
        label { display: block; margin-bottom: 8px; color: var(--muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        input { width: 100%; padding: 14px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border-bright); background: transparent; color: var(--text); font: inherit; font-size: 14px; transition: var(--transition); }
        input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-dim); }

        .btn { width: 100%; margin-top: 10px; border: none; border-radius: var(--radius-sm); padding: 14px 16px; font-size: 14px; font-weight: 700; background: var(--accent); color: white; cursor: pointer; transition: var(--transition); box-shadow: 0 0 20px var(--accent-glow); }
        .btn:hover { background: #ff1a33; box-shadow: 0 0 30px var(--accent-glow); transform: translateY(-2px); }

        .error { margin-bottom: 16px; padding: 12px 14px; border-radius: 10px; background: rgba(232, 0, 29, 0.1); border: 1px solid rgba(232, 0, 29, 0.3); color: var(--accent); font-size: 13px; font-weight: 600; text-align: left; }
    </style>
</head>
<body>
    <div id="starfield"></div>

    <div class="login-card">
        <img src="/static/images/logo.png" alt="Logo" class="brand-logo" onerror="this.style.display='none'">
        <h1>УМНЫЕ ПРЯНИКИ</h1>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div>
                <label for="username">Логин</label>
                <input id="username" name="username" type="text" placeholder="Введите логин" required>
            </div>
            <div>
                <label for="password">Пароль</label>
                <input id="password" name="password" type="password" placeholder="Введите пароль" required>
            </div>
            <button type="submit" class="btn">Войти в систему</button>
        </form>
    </div>

    <script>
        // Генерация звезд
        const starfield = document.getElementById('starfield');
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 1;
            star.style.width = `${size}px`; star.style.height = `${size}px`;
            star.style.left = `${Math.random() * 100}%`;
            star.style.animationDelay = `${Math.random() * 15}s`;
            star.style.animationDuration = `${Math.random() * 20 + 15}s`;
            star.style.setProperty('--drift', (Math.random() - 0.5) * 120);
            starfield.appendChild(star);
        }
    </script>
</body>
</html>
